# .github/workflows/collect-votes.yml
name: Collect Congress Votes (119)

on:
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: "Force full re-sync (skip --fast, re-upload everything)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "30 9 * * *"  # nightly fast mode (09:30 UTC)
    - cron: "0 10 * * 0"  # weekly full mode (Sunday 10:00 UTC)

concurrency:
  group: collect-congress-votes
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  collect_votes:
    runs-on: ubuntu-latest

    env:
      CONGRESSES: ${{ secrets.CONGRESSES || '119' }}
      SESSIONS: ${{ secrets.SESSIONS || '119.2025,119.2026' }}
      GCS_BUCKET: ${{ secrets.GCS_BUCKET || 'congress-legislative-data' }}
      GCS_PREFIX: ${{ secrets.GCS_PREFIX || 'congress-vote-data' }}
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}

    steps:
      # ---------------------------------------------------------------
      # 1. SETUP
      # ---------------------------------------------------------------
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install System Libs
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y python3-venv jq zip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'setup.cfg', 'setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Congress Tool
        run: |
          set -euo pipefail
          python -m venv env
          . env/bin/activate
          python -m pip install --upgrade pip
          pip install "git+https://github.com/unitedstates/congress.git"

      - name: Verify Required Env
        run: |
          set -euo pipefail
          : "${GCP_PROJECT:?Missing required secret GCP_PROJECT}"
          : "${GCS_BUCKET:?Missing required GCS_BUCKET}"
          # Warn if SESSIONS still uses the default — needs annual update
          if [[ "${SESSIONS}" == *"2026"* ]] && [[ "$(date +%Y)" -gt "2026" ]]; then
            echo "WARNING: SESSIONS env var may be outdated. Current year is $(date +%Y). Update the SESSIONS secret."
          fi

      - name: Ensure Data Dir
        run: mkdir -p data

      # ---------------------------------------------------------------
      # 2. GCP AUTH — needed early to query GCS before uploading
      # ---------------------------------------------------------------
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
          version: '>= 472.0.0'

      - name: Ensure Bucket Exists
        run: |
          set -euo pipefail
          gsutil ls -b "gs://${GCS_BUCKET}" >/dev/null 2>&1 \
            || gsutil mb -p "${GCP_PROJECT}" "gs://${GCS_BUCKET}"

      # ---------------------------------------------------------------
      # 3. FETCH VOTES
      #
      #    FIX: Schedule detection now uses a proper step condition
      #    instead of comparing ${{ github.event.schedule }} in bash,
      #    which always resolved to the literal nightly cron string
      #    causing --fast to run even on the weekly full-sync schedule.
      #
      #    Confirmed local path structure from logs:
      #      data/119/votes/2025/h1/data.json   (House)
      #      data/119/votes/2025/s1/data.json   (Senate)
      # ---------------------------------------------------------------
      - name: Fetch Votes (nightly — fast mode)
        if: github.event.schedule == '30 9 * * *' || github.event_name == 'workflow_dispatch' && github.event.inputs.force_full_sync == 'false'
        run: |
          set -euo pipefail
          . env/bin/activate
          echo "Running in FAST mode (nightly / manual without force)"
          usc-run votes --sessions="${SESSIONS}" --fast --log=info

      - name: Fetch Votes (weekly — full mode)
        if: github.event.schedule == '0 10 * * 0' || github.event_name == 'workflow_dispatch' && github.event.inputs.force_full_sync == 'true'
        run: |
          set -euo pipefail
          . env/bin/activate
          echo "Running in FULL mode (weekly / forced manual)"
          usc-run votes --sessions="${SESSIONS}" --log=info

      # ---------------------------------------------------------------
      # 4. VALIDATE — make sure we got something
      # ---------------------------------------------------------------
      - name: Validate fetched votes
        run: |
          set -euo pipefail
          COUNT=$(find data -type f -name "data.json" -path "*/votes/*" | wc -l | tr -d ' ')
          echo "Total vote data.json files fetched: ${COUNT}"
          if [ "${COUNT}" -eq 0 ]; then
            echo "ERROR: No vote files produced — usc-run votes may have failed"
            exit 1
          fi
          # Show sample for debugging
          echo "Sample vote files:"
          find data -type f -name "data.json" -path "*/votes/*" | sort | head -10 | sed 's/^/  /'

      # ---------------------------------------------------------------
      # 5. BUILD VOTES-ONLY MANIFEST
      #
      #    FIX: Uses build_votes_manifest.py instead of the shared
      #    build_manifests.py. This avoids writing empty bills-manifest
      #    and billtext-manifest files, and keeps the votes action
      #    fully self-contained.
      # ---------------------------------------------------------------
      - name: Build votes manifest
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          GCS_PREFIX: ${{ env.GCS_PREFIX }}
        run: |
          set -euo pipefail
          . env/bin/activate
          python scripts/build_votes_manifest.py

      - name: Validate manifest
        run: |
          set -euo pipefail
          if [ ! -f votes-manifest.json ]; then
            echo "ERROR: votes-manifest.json not created"
            exit 1
          fi
          COUNT=$(jq '.files | length' votes-manifest.json 2>/dev/null || echo 0)
          echo "Manifest file count: ${COUNT}"
          if [ "${COUNT}" -eq 0 ]; then
            echo "ERROR: votes-manifest.json is empty — aborting upload"
            exit 1
          fi

      # ---------------------------------------------------------------
      # 6. QUERY GCS — what votes do we already have?
      #
      #    Confirmed GCS path structure from logs:
      #      congress-vote-data/data/119/votes/2025/h1/data.json
      #      congress-vote-data/data/119/votes/2025/s1/data.json
      #
      #    Note: GCS also stores data.xml per vote (confirmed from logs).
      #    We diff on data.json only as the canonical presence indicator.
      # ---------------------------------------------------------------
      - name: Get existing votes from GCS
        id: gcs_state
        run: |
          set -euo pipefail
          PREFIX="${GCS_PREFIX%/}"
          TARGET_BASE="gs://${GCS_BUCKET}/${PREFIX}/data/${CONGRESSES}/votes"

          echo "Querying GCS for existing vote data.json files..."
          gsutil -m ls -r "${TARGET_BASE}/**" 2>/dev/null \
            | grep 'data\.json$' \
            | sed "s|gs://${GCS_BUCKET}/||" \
            | sort > /tmp/gcs_existing_votes.txt || true

          EXISTING=$(wc -l < /tmp/gcs_existing_votes.txt | tr -d ' ')
          echo "existing_count=${EXISTING}" >> "$GITHUB_OUTPUT"
          echo "GCS already has ${EXISTING} vote data.json files"

      # ---------------------------------------------------------------
      # 7. COMPUTE DIFF — which votes are new?
      # ---------------------------------------------------------------
      - name: Compute new votes
        id: diff
        run: |
          set -euo pipefail
          FORCE="${{ github.event.inputs.force_full_sync || 'false' }}"
          PREFIX="${GCS_PREFIX%/}"

          # Build expected GCS paths from local files
          # Local:  data/119/votes/2025/h1/data.json
          # GCS:    congress-vote-data/data/119/votes/2025/h1/data.json
          # (no path segment stripping needed — votes path maps directly)
          find data -type f -name "data.json" -path "*/votes/*" \
            | sed "s|^data/|${PREFIX}/data/|" \
            | sort > /tmp/govinfo_expected_votes.txt

          EXPECTED=$(wc -l < /tmp/govinfo_expected_votes.txt | tr -d ' ')
          echo "Locally available: ${EXPECTED} vote files"

          if [ "$FORCE" = "true" ]; then
            echo "Force sync — treating all ${EXPECTED} votes as new"
            cp /tmp/govinfo_expected_votes.txt /tmp/new_votes.txt
          else
            comm -23 /tmp/govinfo_expected_votes.txt /tmp/gcs_existing_votes.txt \
              > /tmp/new_votes.txt
          fi

          NEW=$(wc -l < /tmp/new_votes.txt | tr -d ' ')
          echo "new_count=${NEW}" >> "$GITHUB_OUTPUT"

          if [ "$NEW" -eq 0 ]; then
            echo "has_new_votes=false" >> "$GITHUB_OUTPUT"
            echo "✓ GCS is already up to date — no new votes to upload."
          else
            echo "has_new_votes=true" >> "$GITHUB_OUTPUT"
            echo "${NEW} new votes to upload. First 10:"
            head -n 10 /tmp/new_votes.txt
          fi

      # ---------------------------------------------------------------
      # 8. UPLOAD NEW VOTES ONLY
      #
      #    Uploads both data.json and data.xml for each new vote.
      #    On weekly full-sync runs, uploads everything (force=true).
      #    On nightly runs, uploads only the delta.
      # ---------------------------------------------------------------
      - name: Upload new votes to GCS
        if: steps.diff.outputs.has_new_votes == 'true'
        run: |
          set -euo pipefail
          PREFIX="${GCS_PREFIX%/}"
          UPLOADED=0
          SKIPPED=0

          while IFS= read -r gcs_json_path; do
            [ -z "$gcs_json_path" ] && continue

            # Convert GCS path back to local path
            # GCS:   congress-vote-data/data/119/votes/2025/h1/data.json
            # Local: data/119/votes/2025/h1/data.json
            LOCAL_JSON="data/${gcs_json_path#${PREFIX}/data/}"
            LOCAL_XML="${LOCAL_JSON%.json}.xml"
            GCS_XML="${gcs_json_path%.json}.xml"

            # Upload data.json
            if [ -f "$LOCAL_JSON" ]; then
              gsutil cp "$LOCAL_JSON" "gs://${GCS_BUCKET}/${gcs_json_path}"
              UPLOADED=$((UPLOADED + 1))
            else
              echo "  WARN: missing locally: ${LOCAL_JSON}"
              SKIPPED=$((SKIPPED + 1))
            fi

            # Upload data.xml if present (votes include XML alongside JSON)
            if [ -f "$LOCAL_XML" ]; then
              gsutil cp "$LOCAL_XML" "gs://${GCS_BUCKET}/${GCS_XML}"
            fi

          done < /tmp/new_votes.txt

          echo "Uploaded: ${UPLOADED} votes | Skipped: ${SKIPPED}"

      - name: Skip upload (already up to date)
        if: steps.diff.outputs.has_new_votes == 'false'
        run: echo "✓ No new votes — skipping upload."

      # ---------------------------------------------------------------
      # 9. UPLOAD MANIFEST
      # ---------------------------------------------------------------
      - name: Upload votes manifest to GCS
        if: steps.diff.outputs.has_new_votes == 'true'
        run: |
          set -euo pipefail
          PREFIX="${GCS_PREFIX%/}"
          # No || true — a failed manifest upload should fail the job
          gsutil cp votes-manifest.json "gs://${GCS_BUCKET}/${PREFIX}/votes-manifest.json"
          gsutil cp votes-manifest-gcs.json "gs://${GCS_BUCKET}/${PREFIX}/votes-manifest-gcs.json"
          echo "✓ Manifest uploaded"

      # ---------------------------------------------------------------
      # 10. SUMMARY
      # ---------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          EXISTING="${{ steps.gcs_state.outputs.existing_count || 0 }}"
          NEW="${{ steps.diff.outputs.new_count || 0 }}"
          HAS_NEW="${{ steps.diff.outputs.has_new_votes || 'false' }}"
          MANIFEST_COUNT=$(jq '.files | length' votes-manifest.json 2>/dev/null || echo 0)
          echo "================================================"
          echo "  Run Summary"
          echo "================================================"
          echo "  Votes already in GCS  : ${EXISTING}"
          echo "  New votes uploaded    : ${NEW}"
          echo "  Manifest total        : ${MANIFEST_COUNT}"
          echo "  Bucket                : ${GCS_BUCKET}"
          echo "  Prefix                : ${GCS_PREFIX}"
          if [ "$HAS_NEW" = "false" ]; then
            echo "  Result: ✓ Already up to date"
          else
            echo "  Result: ✓ Uploaded ${NEW} new votes"
          fi
          echo "================================================"
