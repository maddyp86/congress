# .github/workflows/collect-congress-votes.yml
name: Collect Congress Votes (119)

# Responsibility: Fetch all votes from Congress.gov, upload to GCS, write manifest.
# No incremental diff logic — that is handled downstream by n8n using the
# Vote_Manifest Google Sheet as the system of record.
#
# Fast/full mode is preserved — this is a scraper-level optimization,
# not a diff. --fast only re-fetches recent votes; the weekly full run
# ensures nothing was missed.

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Force full re-fetch (ignore --fast)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "0 10 * * *"    # nightly fast mode (10:00 UTC, after bills at 09:30)
    - cron: "0 11 * * 0"    # weekly full mode (Sunday 11:00 UTC)

concurrency:
  group: collect-congress-votes
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  collect_votes:
    runs-on: ubuntu-latest

    env:
      CONGRESSES: ${{ secrets.CONGRESSES || '119' }}
      SESSIONS: ${{ secrets.SESSIONS || '119.2025,119.2026' }}
      GCS_BUCKET: ${{ secrets.GCS_BUCKET || 'congress-legislative-data' }}
      GCS_PREFIX: ${{ secrets.GCS_PREFIX || 'congress-vote-data' }}
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}

    steps:
      # ---------------------------------------------------------------
      # 1. SETUP
      # ---------------------------------------------------------------
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install System Libs
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y python3-venv jq zip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'setup.cfg', 'setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Congress Tool
        run: |
          set -euo pipefail
          python -m venv env
          . env/bin/activate
          python -m pip install --upgrade pip
          pip install "git+https://github.com/unitedstates/congress.git"

      - name: Verify Required Env
        run: |
          set -euo pipefail
          : "${GCP_PROJECT:?Missing required secret GCP_PROJECT}"
          : "${GCS_BUCKET:?Missing required GCS_BUCKET}"
          if [[ "${SESSIONS}" == *"2026"* ]] && [[ "$(date +%Y)" -gt "2026" ]]; then
            echo "WARNING: SESSIONS env var may be outdated. Current year is $(date +%Y). Update the SESSIONS secret."
          fi

      - name: Ensure Data Dir
        run: mkdir -p data

      # ---------------------------------------------------------------
      # 2. GCP AUTH
      # ---------------------------------------------------------------
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
          version: '>= 472.0.0'

      - name: Ensure Bucket Exists
        run: |
          set -euo pipefail
          gsutil ls -b "gs://${GCS_BUCKET}" >/dev/null 2>&1 \
            || gsutil mb -p "${GCP_PROJECT}" "gs://${GCS_BUCKET}"

      # ---------------------------------------------------------------
      # 3. FETCH VOTES
      #
      #    Nightly: --fast fetches only recent votes (fast, ~10 min)
      #    Weekly:  full fetch catches anything --fast may have missed
      #    Manual:  full_sync=true forces a full re-fetch
      #
      #    NOTE: Step conditions use YAML-level if: to correctly detect
      #    which schedule fired. Comparing github.event.schedule in bash
      #    always resolves to the literal nightly string — a known bug.
      #
      #    Confirmed local path structure from logs:
      #      data/119/votes/2025/h1/data.json   (House)
      #      data/119/votes/2025/s1/data.json   (Senate)
      # ---------------------------------------------------------------
      - name: Fetch Votes (nightly — fast mode)
        if: github.event.schedule == '0 10 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.full_sync == 'false')
        run: |
          set -euo pipefail
          . env/bin/activate
          echo "Running in FAST mode"
          usc-run votes --sessions="${SESSIONS}" --fast --log=info

      - name: Fetch Votes (weekly / forced — full mode)
        if: github.event.schedule == '0 11 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.full_sync == 'true')
        run: |
          set -euo pipefail
          . env/bin/activate
          echo "Running in FULL mode"
          usc-run votes --sessions="${SESSIONS}" --log=info

      # ---------------------------------------------------------------
      # 4. VALIDATE
      # ---------------------------------------------------------------
      - name: Validate fetched votes
        run: |
          set -euo pipefail
          COUNT=$(find data -type f -name "data.json" -path "*/votes/*" | wc -l | tr -d ' ')
          echo "Total vote data.json files: ${COUNT}"
          if [ "${COUNT}" -eq 0 ]; then
            echo "ERROR: No vote files produced — usc-run votes may have failed"
            exit 1
          fi
          echo "Sample vote files:"
          set +o pipefail
          find data -type f -name "data.json" -path "*/votes/*" | sort | head -10 | sed 's/^/  /'
          set -o pipefail

      # ---------------------------------------------------------------
      # 5. BUILD MANIFEST
      # ---------------------------------------------------------------
      - name: Build votes manifest
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          GCS_PREFIX: ${{ env.GCS_PREFIX }}
          MANIFEST_MODE: "votes"
        run: |
          set -euo pipefail
          . env/bin/activate
          python scripts/build_manifests.py

      - name: Validate manifest
        run: |
          set -euo pipefail
          if [ ! -f votes-manifest.json ]; then
            echo "ERROR: votes-manifest.json not created"
            exit 1
          fi
          COUNT=$(jq '.files | length' votes-manifest.json 2>/dev/null || echo 0)
          echo "Manifest contains ${COUNT} votes"
          if [ "${COUNT}" -eq 0 ]; then
            echo "ERROR: Manifest is empty — aborting upload"
            exit 1
          fi

      # ---------------------------------------------------------------
      # 6. UPLOAD TO GCS
      #
      #    rsync uploads all vote files (both data.json and data.xml).
      #    Confirmed GCS path structure from logs:
      #      congress-vote-data/data/119/votes/2025/h1/data.json
      #      congress-vote-data/data/119/votes/2025/s1/data.json
      #    Unlike bills, votes path maps directly — no segment stripping.
      # ---------------------------------------------------------------
      - name: Upload votes to GCS
        run: |
          set -euo pipefail
          PREFIX="${GCS_PREFIX%/}"
          for C in data/*; do
            [ -d "$C/votes" ] || continue
            CONS=$(basename "$C")
            GCS_DEST="gs://${GCS_BUCKET}/${PREFIX}/data/${CONS}/votes"
            echo "Syncing votes for Congress ${CONS} -> ${GCS_DEST}"
            gsutil -m rsync -r "$C/votes" "${GCS_DEST}"
          done

      - name: Upload votes manifest to GCS
        run: |
          set -euo pipefail
          PREFIX="${GCS_PREFIX%/}"
          gsutil cp votes-manifest.json "gs://${GCS_BUCKET}/${PREFIX}/votes-manifest.json"
          gsutil cp votes-manifest-gcs.json "gs://${GCS_BUCKET}/${PREFIX}/votes-manifest-gcs.json"
          echo "✓ Manifest uploaded"

      # ---------------------------------------------------------------
      # 7. SUMMARY
      # ---------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          MANIFEST_COUNT=$(jq '.files | length' votes-manifest.json 2>/dev/null || echo 0)
          echo "================================================"
          echo "  Run Summary"
          echo "================================================"
          echo "  Votes in manifest     : ${MANIFEST_COUNT}"
          echo "  Bucket                : ${GCS_BUCKET}"
          echo "  Prefix                : ${GCS_PREFIX}"
          echo "  Result: ✓ Complete"
          echo "================================================"
