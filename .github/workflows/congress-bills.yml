# .github/workflows/collect-congress-bills.yml
name: Collect Congress Bills (119)

# Responsibility: Fetch all senate bills from GovInfo, upload to GCS, write manifest.
# No incremental diff logic — that is handled downstream by n8n using the
# Bill_Manifest Google Sheet as the system of record.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 9 * * *"  # nightly (09:30 UTC)

concurrency:
  group: collect-congress-bills
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  collect_bills:
    runs-on: ubuntu-latest

    env:
      CONGRESSES: ${{ secrets.CONGRESSES || '119' }}
      GCS_BUCKET: ${{ secrets.GCS_BUCKET || 'congress-legislative-data' }}
      GCS_PREFIX: ${{ secrets.GCS_PREFIX || 'congress-bill-data' }}
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
      SENATE_TYPES: "s sres sjres sconres"

    steps:
      # ---------------------------------------------------------------
      # 1. SETUP
      # ---------------------------------------------------------------
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install System Libs
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y python3-venv jq zip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'setup.cfg', 'setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Congress Tool
        run: |
          set -euo pipefail
          python -m venv env
          . env/bin/activate
          python -m pip install --upgrade pip
          pip install "git+https://github.com/unitedstates/congress.git"

      - name: Verify Required Env
        run: |
          set -euo pipefail
          : "${GCP_PROJECT:?Missing required secret GCP_PROJECT}"
          : "${GCS_BUCKET:?Missing required GCS_BUCKET}"

      - name: Ensure Data Dir
        run: mkdir -p data

      # ---------------------------------------------------------------
      # 2. GCP AUTH
      # ---------------------------------------------------------------
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
          version: '>= 472.0.0'

      - name: Ensure Bucket Exists
        run: |
          set -euo pipefail
          gsutil ls -b "gs://${GCS_BUCKET}" >/dev/null 2>&1 \
            || gsutil mb -p "${GCP_PROJECT}" "gs://${GCS_BUCKET}"

      # ---------------------------------------------------------------
      # 3. FETCH BILLS
      #
      #    usc-run govinfo downloads BILLSTATUS XMLs into cache.
      #    usc-run bills reads that cache and writes parsed data.json
      #    files into data/119/bills/<type>/<number>/data.json.
      #    Both steps must run sequentially — govinfo first.
      #
      #    Confirmed local path structure from logs:
      #      data/119/bills/s/s123/data.json
      #      data/119/bills/sres/sres45/data.json
      # ---------------------------------------------------------------
      - name: Fetch GovInfo BILLSTATUS
        run: |
          set -euo pipefail
          . env/bin/activate
          echo "Downloading BILLSTATUS index from GovInfo..."
          usc-run govinfo --bulkdata=BILLSTATUS --congress="${CONGRESSES}"

      - name: Process Bills
        run: |
          set -euo pipefail
          . env/bin/activate
          echo "Processing bills into data/..."
          usc-run bills --congress="${CONGRESSES}" --log=info

      # ---------------------------------------------------------------
      # 4. VALIDATE
      # ---------------------------------------------------------------
      - name: Validate fetched bills
        run: |
          set -euo pipefail
          COUNT=$(find data -type f -name "data.json" -path "*/bills/*" | wc -l | tr -d ' ')
          echo "Total bill data.json files: ${COUNT}"
          if [ "${COUNT}" -eq 0 ]; then
            echo "ERROR: No bill files produced — usc-run bills may have failed"
            exit 1
          fi
          echo "Sample bill files:"
          set +o pipefail
          find data -type f -name "data.json" -path "*/bills/*" | sort | head -10 | sed 's/^/  /'
          set -o pipefail

      # ---------------------------------------------------------------
      # 5. BUILD MANIFEST
      # ---------------------------------------------------------------
      - name: Build manifests
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          GCS_PREFIX: ${{ env.GCS_PREFIX }}
          MANIFEST_MODE: "bills"
        run: |
          set -euo pipefail
          . env/bin/activate
          python scripts/build_manifests.py

      - name: Validate manifest
        run: |
          set -euo pipefail
          if [ ! -f bills-manifest.json ]; then
            echo "ERROR: bills-manifest.json was not created"
            exit 1
          fi
          COUNT=$(jq '.files | length' bills-manifest.json 2>/dev/null || echo 0)
          echo "Manifest contains ${COUNT} bills"
          if [ "${COUNT}" -eq 0 ]; then
            echo "ERROR: Manifest is empty — aborting upload"
            exit 1
          fi

      # ---------------------------------------------------------------
      # 6. UPLOAD TO GCS
      #
      #    rsync uploads all senate bill types.
      #    Note: rsync strips the 'bills/' segment from the path.
      #    Local:  data/119/bills/s/s123/data.json
      #    GCS:    congress-bill-data/data/119/s/s123/data.json
      #    build_manifests.py accounts for this in its URL construction.
      # ---------------------------------------------------------------
      - name: Upload bills to GCS
        run: |
          set -euo pipefail
          PREFIX="${GCS_PREFIX%/}"
          for TYPE in ${SENATE_TYPES}; do
            LOCAL_DIR="data/${CONGRESSES}/bills/${TYPE}"
            GCS_DEST="gs://${GCS_BUCKET}/${PREFIX}/data/${CONGRESSES}/${TYPE}"
            if [ -d "${LOCAL_DIR}" ]; then
              echo "Syncing ${TYPE} -> ${GCS_DEST}"
              gsutil -m rsync -r "${LOCAL_DIR}" "${GCS_DEST}"
            else
              echo "  No data for type ${TYPE} — skipping"
            fi
          done

      - name: Upload manifest to GCS
        run: |
          set -euo pipefail
          PREFIX="${GCS_PREFIX%/}"
          gsutil cp bills-manifest.json "gs://${GCS_BUCKET}/${PREFIX}/bills-manifest.json"
          gsutil cp bills-manifest-gcs.json "gs://${GCS_BUCKET}/${PREFIX}/bills-manifest-gcs.json"
          echo "✓ Manifest uploaded"

      # ---------------------------------------------------------------
      # 7. SUMMARY
      # ---------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          MANIFEST_COUNT=$(jq '.files | length' bills-manifest.json 2>/dev/null || echo 0)
          echo "================================================"
          echo "  Run Summary"
          echo "================================================"
          echo "  Bills in manifest     : ${MANIFEST_COUNT}"
          echo "  Bucket                : ${GCS_BUCKET}"
          echo "  Prefix                : ${GCS_PREFIX}"
          echo "  Result: ✓ Complete"
          echo "================================================"
